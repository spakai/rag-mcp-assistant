name: ci

on:
  push:
  pull_request:

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements-dev.txt
      - run: ruff check .
      # Tolerate "no tests collected" (exit 5) until the first feature adds tests.
      - run: pytest tests/ -q || [ $? -eq 5 ]

  integration-localstack:
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false
      - run: pip install -r requirements-dev.txt terraform-local awscli-local

      # The integration stack (docker-compose.yml + infra/) is created in
      # spec 001. Until it exists, this job skips gracefully; once it lands it
      # activates automatically. Bedrock/Aurora tests (spec 002+) are env-gated
      # and skip here because no AWS credentials are present.
      - name: Run LocalStack integration (if the stack exists)
        env:
          LOCALSTACK_AUTH_TOKEN: ${{ secrets.LOCALSTACK_AUTH_TOKEN }}
        run: |
          if [ ! -f docker-compose.yml ] || [ ! -d infra ]; then
            echo "No LocalStack stack yet (docker-compose.yml/infra absent) — skipping."
            exit 0
          fi
          docker compose up -d
          echo "Waiting for LocalStack to report healthy..."
          ok=""
          for i in $(seq 1 45); do
            if curl -sf http://127.0.0.1:4566/_localstack/health >/dev/null 2>&1; then
              ok=1; echo "LocalStack is up"; break
            fi
            sleep 2
          done
          if [ -z "$ok" ]; then
            echo "::error::LocalStack did not become healthy. Logs:"
            docker compose logs localstack
            exit 1
          fi
          bash scripts/build.sh
          tflocal -chdir=infra init -input=false
          tflocal -chdir=infra apply -auto-approve -input=false -var "localstack_endpoint=http://127.0.0.1:4566"
          pytest tests/integration -q || [ $? -eq 5 ]
        # Endpoint for the integration tests (IPv4 to dodge ::1 surprises)
        # is read from AWS_ENDPOINT_URL by the test code.

  integration-aws:
    runs-on: ubuntu-latest
    # Only triggered manually — real AWS costs money.
    if: github.event_name == 'workflow_dispatch'
    environment: aws-integration
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      - run: pip install -r requirements-dev.txt
      - name: Deploy to AWS and initialise Aurora schema
        env:
          BEDROCK_EMBEDDING_MODEL_ID: amazon.titan-embed-text-v2:0
          BEDROCK_GENERATION_MODEL_ID: amazon.nova-micro-v1:0
        run: bash scripts/deploy-aws.sh
      - name: Run real-AWS integration tests
        run: RUN_AWS_INTEGRATION=1 pytest tests/integration/ -v
